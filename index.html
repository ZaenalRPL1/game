<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Ikan Makan Ikan</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    overscroll-behavior: none;
  }
  body {
    background: linear-gradient(180deg, #0a4d68 0%, #05294a 50%, #021627 100%);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100dvh;
    font-family: 'Segoe UI', Arial, sans-serif;
    overflow: hidden;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
  }
  #gameContainer {
    position: relative;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 0 40px rgba(0, 200, 255, 0.3);
    width: min(96vw, 900px);
    aspect-ratio: 900 / 600;
    max-height: 96dvh;
    touch-action: none;
  }
  canvas {
    display: block;
    background: transparent;
    width: 100%;
    height: 100%;
    touch-action: none;
  }
  @media (max-width: 600px) {
    #hud { font-size: 14px; top: 8px; left: 8px; }
    #hud div { margin-bottom: 2px; }
    #overlay h1 { font-size: 28px; }
    #overlay p { font-size: 13px; max-width: 90%; }
    #overlay button { padding: 14px 30px; font-size: 17px; }
    #logoCorner { bottom: 6px; right: 6px; gap: 6px; }
    #logoCorner img { height: 26px; }
    #overlayLogos { gap: 10px; margin-bottom: 12px; }
    #overlayLogos img { height: 40px; }
    #joystick { width: 90px; height: 90px; left: 16px; bottom: 16px; }
    #joystickKnob { width: 40px; height: 40px; margin-left: -20px; margin-top: -20px; }
  }
  #hud {
    position: absolute;
    top: 12px;
    left: 12px;
    color: #fff;
    font-size: 18px;
    text-shadow: 0 2px 4px rgba(0,0,0,0.6);
    z-index: 10;
  }
  #hud div { margin-bottom: 4px; }
  #overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,10,20,0.8);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    color: #fff;
    text-align: center;
    z-index: 20;
  }
  #overlay h1 {
    font-size: 42px;
    margin-bottom: 12px;
    color: #7fe7ff;
    text-shadow: 0 0 15px rgba(127,231,255,0.8);
  }
  #overlayLogos {
    display: flex;
    align-items: center;
    gap: 18px;
    margin-bottom: 18px;
  }
  #overlayLogos img {
    height: 64px;
    width: auto;
    border-radius: 10px;
    background: rgba(255,255,255,0.08);
    padding: 5px;
    box-shadow: 0 3px 12px rgba(0,0,0,0.4);
  }
  #overlay p {
    font-size: 16px;
    margin-bottom: 6px;
    color: #cfefff;
    max-width: 420px;
  }
  #overlay button {
    margin-top: 20px;
    padding: 12px 32px;
    font-size: 18px;
    border: none;
    border-radius: 30px;
    background: linear-gradient(135deg, #00c6ff, #0072ff);
    color: white;
    cursor: pointer;
    font-weight: bold;
    box-shadow: 0 4px 15px rgba(0,150,255,0.5);
    transition: transform 0.15s;
  }
  #overlay button:active { transform: scale(0.95); }
  #btnRow {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    justify-content: center;
  }
  #exitBtn {
    background: linear-gradient(135deg, #ff6b6b, #d64545) !important;
  }
  .hidden { display: none !important; }
  #logoCorner {
    position: absolute;
    bottom: 10px;
    right: 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    z-index: 10;
  }
  #logoCorner img {
    height: 40px;
    width: auto;
    border-radius: 8px;
    background: rgba(255,255,255,0.08);
    padding: 3px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    opacity: 0.9;
  }
  #joystick {
    position: absolute;
    left: 24px;
    bottom: 24px;
    width: 110px;
    height: 110px;
    border-radius: 50%;
    background: rgba(255,255,255,0.12);
    border: 2px solid rgba(255,255,255,0.35);
    z-index: 15;
    touch-action: none;
  }
  #joystickKnob {
    position: absolute;
    left: 50%;
    top: 50%;
    width: 50px;
    height: 50px;
    margin-left: -25px;
    margin-top: -25px;
    border-radius: 50%;
    background: linear-gradient(135deg, #00c6ff, #0072ff);
    box-shadow: 0 3px 10px rgba(0,150,255,0.6);
  }
</style>
</head>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

const overlay = document.getElementById('overlay');
const overlayTitle = document.getElementById('overlayTitle');
const startBtn = document.getElementById('startBtn');
const btnRow = document.getElementById('btnRow');
const playAgainBtn = document.getElementById('playAgainBtn');
const exitBtn = document.getElementById('exitBtn');
const sizeDisplay = document.getElementById('sizeDisplay');
const scoreDisplay = document.getElementById('scoreDisplay');

const MAX_SIZE = 130; // ukuran maksimal untuk menyelesaikan misi

let mouse = { x: W/2, y: H/2 };
canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  mouse.x = (e.clientX - rect.left) * (W / rect.width);
  mouse.y = (e.clientY - rect.top) * (H / rect.height);
});

// --- Virtual analog joystick (mobile/Android) ---
const isTouchDevice = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
const joystickEl = document.getElementById('joystick');
const joystickKnob = document.getElementById('joystickKnob');
let joyActive = false;
let joyVector = { x: 0, y: 0 }; // normalized -1..1
let joyCenter = { x: 0, y: 0 };
let joyRadius = 30;

function joyStart(e) {
  e.preventDefault();
  joyActive = true;
  const rect = joystickEl.getBoundingClientRect();
  joyCenter.x = rect.left + rect.width / 2;
  joyCenter.y = rect.top + rect.height / 2;
  joyRadius = rect.width / 2 - joystickKnob.offsetWidth / 2;
  joyMove(e);
}
function joyMove(e) {
  if (!joyActive) return;
  e.preventDefault();
  const touch = e.touches ? e.touches[0] : e;
  const dx = touch.clientX - joyCenter.x;
  const dy = touch.clientY - joyCenter.y;
  const dist = Math.hypot(dx, dy);
  const clamped = Math.min(dist, joyRadius);
  const angle = Math.atan2(dy, dx);
  const kx = Math.cos(angle) * clamped;
  const ky = Math.sin(angle) * clamped;
  joystickKnob.style.transform = `translate(${kx}px, ${ky}px)`;
  joyVector.x = kx / joyRadius;
  joyVector.y = ky / joyRadius;
}
function joyEnd(e) {
  if (e) e.preventDefault();
  joyActive = false;
  joyVector.x = 0;
  joyVector.y = 0;
  joystickKnob.style.transform = 'translate(0px, 0px)';
}
joystickEl.addEventListener('touchstart', joyStart, { passive: false });
joystickEl.addEventListener('touchmove', joyMove, { passive: false });
joystickEl.addEventListener('touchend', joyEnd, { passive: false });
joystickEl.addEventListener('touchcancel', joyEnd, { passive: false });

document.addEventListener('touchmove', (e) => { e.preventDefault(); }, { passive: false });

const instructionText = isTouchDevice
  ? 'Gunakan joystick di pojok kiri bawah untuk mengendalikan ikanmu. Makan ikan yang lebih kecil (warna lebih terang) untuk tumbuh besar. Hindari ikan yang lebih besar darimu, atau kamu akan dimakan!'
  : 'Gerakkan mouse untuk mengendalikan ikanmu. Makan ikan yang lebih kecil (warna lebih terang) untuk tumbuh besar. Hindari ikan yang lebih besar darimu, atau kamu akan dimakan!';
document.querySelector('#overlay p').textContent = instructionText;
if (isTouchDevice) {
  joystickEl.classList.remove('hidden');
}

function rand(min, max) { return Math.random() * (max - min) + min; }

function fishColor(size) {
  // smaller = brighter/cooler, bigger = warmer/darker (danger)
  if (size < 15) return { body: '#4fd8ff', tail: '#2fb8e8' };
  if (size < 25) return { body: '#7fe0a0', tail: '#5cc080' };
  if (size < 40) return { body: '#ffd35c', tail: '#f0b93c' };
  if (size < 60) return { body: '#ff9a5c', tail: '#e87c3c' };
  return { body: '#ff5c5c', tail: '#e83c3c' };
}

class Fish {
  constructor(x, y, size, isPlayer = false) {
    this.x = x;
    this.y = y;
    this.size = size;
    this.isPlayer = isPlayer;
    this.angle = 0;
    this.speed = isPlayer ? 3.2 : rand(0.35, 0.9);
    this.dir = rand(0, Math.PI * 2);
    this.dirTimer = rand(60, 180);
    this.wobble = rand(0, Math.PI * 2);
    this.colors = fishColor(size);
    this.flash = 0;
  }

  update(player) {
    if (this.isPlayer) {
      if (joyActive && (Math.abs(joyVector.x) > 0.05 || Math.abs(joyVector.y) > 0.05)) {
        // analog joystick control
        const mag = Math.min(Math.hypot(joyVector.x, joyVector.y), 1);
        this.angle = Math.atan2(joyVector.y, joyVector.x);
        const speedFactor = mag * this.speed;
        this.x += Math.cos(this.angle) * speedFactor;
        this.y += Math.sin(this.angle) * speedFactor;
      } else {
        const dx = mouse.x - this.x;
        const dy = mouse.y - this.y;
        const dist = Math.hypot(dx, dy);
        this.angle = Math.atan2(dy, dx);
        if (dist > 4) {
          const speedFactor = Math.min(dist / 60, 1) * this.speed;
          this.x += Math.cos(this.angle) * speedFactor;
          this.y += Math.sin(this.angle) * speedFactor;
        }
      }
    } else {
      this.dirTimer--;
      if (this.dirTimer <= 0) {
        this.dir += rand(-1, 1);
        this.dirTimer = rand(60, 180);
      }
      // flee or chase relative to player
      if (player) {
        const dx = this.x - player.x;
        const dy = this.y - player.y;
        const dist = Math.hypot(dx, dy);
        if (dist < 130) {
          const angleToPlayer = Math.atan2(dy, dx);
          if (this.size < player.size) {
            // flee
            this.dir = angleToPlayer;
          } else if (this.size > player.size + 10 && dist < 110) {
            // chase, dan hanya bergerak pelan saat mengejar
            this.dir = angleToPlayer + Math.PI;
            this.speed = Math.min(this.speed, 0.5);
          }
        }
      }
      this.angle = this.dir;
      this.x += Math.cos(this.dir) * this.speed;
      this.y += Math.sin(this.dir) * this.speed;

      // bounce off walls
      const margin = this.size + 10;
      if (this.x < margin) { this.x = margin; this.dir = Math.PI - this.dir; }
      if (this.x > W - margin) { this.x = W - margin; this.dir = Math.PI - this.dir; }
      if (this.y < margin) { this.y = margin; this.dir = -this.dir; }
      if (this.y > H - margin) { this.y = H - margin; this.dir = -this.dir; }
    }

    // keep player inside bounds
    if (this.isPlayer) {
      this.x = Math.max(this.size, Math.min(W - this.size, this.x));
      this.y = Math.max(this.size, Math.min(H - this.size, this.y));
    }

    this.wobble += 0.15;
    if (this.flash > 0) this.flash--;
  }

  draw() {
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.angle);

    const flip = Math.cos(this.angle) < 0 ? -1 : 1;
    ctx.scale(1, flip === -1 ? 1 : 1);

    const bodyLen = this.size * 1.8;
    const bodyH = this.size;
    const tailWag = Math.sin(this.wobble) * (this.size * 0.25);

    // tail
    ctx.beginPath();
    ctx.moveTo(-bodyLen/2, 0);
    ctx.lineTo(-bodyLen/2 - this.size*0.7, -this.size*0.5 + tailWag);
    ctx.lineTo(-bodyLen/2 - this.size*0.7, this.size*0.5 + tailWag);
    ctx.closePath();
    ctx.fillStyle = this.colors.tail;
    ctx.fill();

    // body
    ctx.beginPath();
    ctx.ellipse(0, 0, bodyLen/2, bodyH/2, 0, 0, Math.PI * 2);
    ctx.fillStyle = this.flash > 0 ? '#ffffff' : this.colors.body;
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // eye
    ctx.beginPath();
    ctx.arc(bodyLen*0.28, -bodyH*0.15, Math.max(2, this.size*0.12), 0, Math.PI*2);
    ctx.fillStyle = '#fff';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(bodyLen*0.3, -bodyH*0.15, Math.max(1, this.size*0.06), 0, Math.PI*2);
    ctx.fillStyle = '#000';
    ctx.fill();

    ctx.restore();
  }
}

class Bubble {
  constructor() {
    this.x = rand(0, W);
    this.y = H + rand(0, 100);
    this.r = rand(2, 6);
    this.speed = rand(0.5, 1.5);
  }
  update() {
    this.y -= this.speed;
    this.x += Math.sin(this.y * 0.02) * 0.3;
    if (this.y < -10) { this.y = H + 10; this.x = rand(0, W); }
  }
  draw() {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI*2);
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 1;
    ctx.stroke();
  }
}

let player;
let fishes = [];
let bubbles = [];
let score = 0;
let running = false;
let particles = [];

function spawnFish() {
  // sebagian besar ikan berukuran kecil, sesekali ada yang besar
  const roll = Math.random();
  let size;
  if (roll < 0.65) {
    size = rand(5, 15);       // banyak ikan kecil, gampang dimakan
  } else if (roll < 0.9) {
    size = rand(15, 35);      // ikan sedang
  } else {
    size = rand(35, 60);      // sedikit ikan besar
  }
  let x, y;
  // spawn away from player
  do {
    x = rand(30, W - 30);
    y = rand(30, H - 30);
  } while (player && Math.hypot(x - player.x, y - player.y) < 150);
  fishes.push(new Fish(x, y, size));
}

function initGame() {
  player = new Fish(W/2, H/2, 10, true);
  fishes = [];
  bubbles = [];
  particles = [];
  score = 0;
  for (let i = 0; i < 30; i++) spawnFish();
  for (let i = 0; i < 25; i++) bubbles.push(new Bubble());
  updateHUD();
}

function updateHUD() {
  sizeDisplay.textContent = Math.round(player.size);
  scoreDisplay.textContent = score;
}

function spawnParticles(x, y, color) {
  for (let i = 0; i < 8; i++) {
    particles.push({
      x, y,
      vx: rand(-3, 3),
      vy: rand(-3, 3),
      life: 30,
      color
    });
  }
}

function checkCollisions() {
  for (let i = fishes.length - 1; i >= 0; i--) {
    const f = fishes[i];
    const dist = Math.hypot(f.x - player.x, f.y - player.y);
    if (dist < (f.size + player.size) * 0.55) {
      if (player.size > f.size * 1.02) {
        // player eats fish
        player.size += f.size * 0.15;
        player.colors = fishColor(player.size);
        score += Math.round(f.size);
        spawnParticles(f.x, f.y, f.colors.body);
        fishes.splice(i, 1);
        spawnFish();
        updateHUD();
        if (player.size >= MAX_SIZE) {
          missionComplete();
          return;
        }
      } else if (f.size > player.size * 1.3) {
        // player gets eaten -> game over
        gameOver();
        return;
      }
    }
  }
}

function gameOver() {
  running = false;
  overlayTitle.textContent = '💀 Game Over!';
  document.querySelector('#overlay p').textContent = `Ikanmu dimakan! Skor akhir: ${score}, ukuran akhir: ${Math.round(player.size)}.`;
  startBtn.classList.add('hidden');
  btnRow.classList.remove('hidden');
  overlay.classList.remove('hidden');
}

function missionComplete() {
  running = false;
  overlayTitle.textContent = '🏆 Misi Selesai!';
  document.querySelector('#overlay p').textContent = `Selamat! Ikanmu sudah mencapai ukuran maksimal (${Math.round(player.size)}) dan berhasil melahap ikan-ikan besar! Skor akhir: ${score}.`;
  startBtn.classList.add('hidden');
  btnRow.classList.remove('hidden');
  overlay.classList.remove('hidden');
}

function loop() {
  if (!running) return;
  ctx.clearRect(0, 0, W, H);

  // background gradient water effect (subtle)
  const grad = ctx.createRadialGradient(player.x, player.y, 50, player.x, player.y, 500);
  grad.addColorStop(0, 'rgba(0,80,120,0.15)');
  grad.addColorStop(1, 'rgba(0,20,40,0.35)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  bubbles.forEach(b => { b.update(); b.draw(); });

  fishes.forEach(f => f.update(player));
  fishes.sort((a,b) => a.size - b.size);
  fishes.forEach(f => f.draw());

  player.update();
  player.draw();

  checkCollisions();

  // particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.life--;
    ctx.globalAlpha = Math.max(0, p.life / 30);
    ctx.beginPath();
    ctx.arc(p.x, p.y, 3, 0, Math.PI*2);
    ctx.fillStyle = p.color;
    ctx.fill();
    ctx.globalAlpha = 1;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // maintain fish count
  while (fishes.length < 30) spawnFish();

  requestAnimationFrame(loop);
}

startBtn.addEventListener('click', () => {
  overlay.classList.add('hidden');
  overlayTitle.textContent = '🐠 Ikan Makan Ikan 🐠';
  document.querySelector('#overlay p').textContent = instructionText;
  initGame();
  running = true;
  loop();
});

playAgainBtn.addEventListener('click', () => {
  overlay.classList.add('hidden');
  btnRow.classList.add('hidden');
  startBtn.classList.remove('hidden');
  initGame();
  running = true;
  loop();
});

exitBtn.addEventListener('click', () => {
  running = false;
  overlayTitle.textContent = '👋 Sampai Jumpa!';
  document.querySelector('#overlay p').textContent = 'Terima kasih sudah bermain Ikan Makan Ikan. Semoga menyenangkan!';
  btnRow.classList.add('hidden');
  overlay.classList.remove('hidden');
  window.close();
});
</script>
</body>
</html>
